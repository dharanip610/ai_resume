<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Upload Resume - ATS</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= NAVBAR ================= -->
<div class="navbar">

    <div class="logo">ATS Upload</div>

    <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="upload.html">Upload</a>
        <a href="candidates.html">Candidates</a>
        <a href="login.html">Logout</a>
    </nav>

</div>

<!-- ================= MAIN ================= -->
<div class="container">

    <div class="header">
        <h1>Upload Resumes</h1>
        <p>Upload PDF, DOC, DOCX files</p>
    </div>

    <!-- ================= UPLOAD BOX ================= -->
    <div class="upload-box">

        <!-- FILE INPUT -->
        <input 
            type="file" 
            id="resumeFile" 
            multiple 
            accept=".pdf,.doc,.docx">

        <!-- BUTTON -->
        
<button onclick="uploadResume()">
    Upload Resumes
</button>
        <!-- STATUS -->
        <p id="uploadStatus">Select resume file</p>

    </div>

</div>

<!-- JS FILE -->
<script src="upload.js"></script>

</body>
</html>
