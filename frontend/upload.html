        <p>Upload PDF, DOC, DOCX files</p>

📄 Supported Formats:
PDF, DOC, DOCX

    <!-- ================= UPLOAD BOX ================= -->
    <div class="upload-box">

        <!-- FILE INPUT -->
        <input 
            type="file" 
            id="resumeFile" 
            multiple 
            accept=".pdf,.doc,.docx">

        <!-- BUTTON -->
        
<button onclick="uploadResume()">
    Upload Resumes
</button>
        <!-- STATUS -->
        <p id="uploadStatus">Select resume file</p>

    </div>

</div>
