<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - AI ATS</title>

    <link rel="stylesheet" href="login.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div class="login-wrapper">

    <div class="login-card">

        <div style="font-size:60px;margin-bottom:10px;">
            🔐
        </div>

        <h1>Admin Portal</h1>

        <p class="login-subtitle">
            Administrator Access Panel
        </p>

        <input
            type="email"
            id="email"
            placeholder="Enter Admin Email">

        <input
            type="password"
            id="password"
            placeholder="Enter Password">

        <button
            id="loginBtn"
            class="primary-btn">

            Admin Login

        </button>

        <div id="msg"></div>

    </div>

</div>

<script>

const supabaseClient = window.supabase.createClient(
        "https://tyznmenzpxstbgyqeppt.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR5em5tZW56cHhzdGJneXFlcHB0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3NzY4NzYsImV4cCI6MjA5NTM1Mjg3Nn0.afpxfRoVezm78D6WG_vOn7w1PVa7lcBZKnYMM479m-0"
    );


async function login() {

    const email =
        document.getElementById("email").value.trim();

    const password =
        document.getElementById("password").value;

    const msg =
        document.getElementById("msg");

    if (!email || !password) {

        msg.style.color = "red";

        msg.innerText =
            "Please enter email and password";

        return;
    }

    msg.style.color = "#2563eb";

    msg.innerText =
        "Logging in...";

    try {

        const { data, error } =
            await supabaseClient.auth.signInWithPassword({
                email,
                password
            });

        if (error) {

            msg.style.color = "red";

            msg.innerText =
                error.message;

            return;
        }

        const user =
            data.user;

        const { data: profile } =
            await supabaseClient
                .from("profiles")
                .select(`
                    role,
                    trial_end_date,
                    subscription_status,
                    status
                `)
                .eq("id", user.id)
                .single();

        if (!profile) {

            msg.style.color = "red";

            msg.innerText =
                "Profile not found";

            return;
        }

        if (profile.role !== "admin") {

            await supabaseClient.auth.signOut();

            localStorage.clear();

            msg.style.color = "red";

            msg.innerText =
                "Only Admin Login Allowed";

            return;
        }

        localStorage.setItem(
            "access_token",
            data.session.access_token
        );

        localStorage.setItem(
            "role",
            profile.role
        );

        msg.style.color = "green";

        msg.innerText =
            "Admin Login Success 🚀";

        setTimeout(() => {

            window.location.href =
                "admin.html";

        }, 1000);

    } catch (err) {

        console.error(err);

        msg.style.color = "red";

        msg.innerText =
            "Server Error";
    }
}

document
    .getElementById("loginBtn")
    .addEventListener("click", login);

</script>

</body>
</html>
