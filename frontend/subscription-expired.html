<!DOCTYPE html>
<html>
<head>
    <title>Subscription Expired</title>

    <style>

        body{
            font-family:Segoe UI;
            background:#f4f7fc;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            background:white;
            padding:40px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 5px 20px rgba(0,0,0,.1);
        }

        h1{
            color:red;
        }

        button{
            background:#2563eb;
            color:white;
            border:none;
            padding:12px 20px;
            border-radius:8px;
            cursor:pointer;
        }

    </style>

</head>

<body>

<div class="box">

    <h1>
        Subscription Expired
    </h1>

    <p>
        Your trial period has ended.
    </p>

    <p>
        Please contact admin to activate your plan.
    </p>

    <button
        onclick="window.location.href='login.html'">

        Back To Login

    </button>

</div>

</body>
</html>
