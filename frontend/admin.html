<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Panel - ATS</title>
    <link rel="stylesheet" href="admin.css">
</head>

<body>

<!-- ================= NAVBAR ================= -->
<nav>

    <div class="logo">
        ATS Admin Panel
    </div>

    <div class="nav-links">
        <a href="admin.html">Dashboard</a>
        <a href="onboarding-requests.html">Onboarding</a>
        <a href="demo-requests.html">Demo Requests</a>
        <a href="#" onclick="logout()">Logout</a>
    </div>

</nav>

<!-- ================= CONTAINER ================= -->
<div class="container">

    <div class="header">
        <h1>System Administration</h1>
        <p>Manage HR users and monitor ATS system</p>
    </div>

    <!-- ================= STATS ================= -->
<div class="cards">

    <div class="card">
        <h3>Total HR Users</h3>
        <h2 id="hrCount">0</h2>
    </div>

    <div class="card">
        <h3>Total Resumes</h3>
        <h2 id="resumeCount">0</h2>
    </div>

    <div class="card">
        <h3>Active Today</h3>
        <h2 id="activeCount">0</h2>
    </div>

    <div
        class="card clickable-card"
        onclick="window.location.href='onboarding-requests.html'">

        <h3>Pending Onboarding</h3>
        <h2 id="pendingOnboarding">0</h2>

    </div>

    <div
        class="card clickable-card"
        onclick="window.location.href='demo-requests.html'">

        <h3>Pending Demo Requests</h3>
        <h2 id="pendingDemo">0</h2>

    </div>

</div>

    <!-- ================= HR LIST ================= -->
    <h2 style="margin-top:40px;">HR Users</h2>

    <table>

        <thead>
          <tr>
    <th>Email</th>
    <th>Role</th>
    <th>Subscription</th>
    <th>Trial End</th>
    <th>Status</th>
    <th>Action</th>
       </tr>
        </thead>

        <tbody id="hrTable"></tbody>

    </table>

</div>
<!-- HR DETAILS MODAL -->

<div id="hrModal" class="modal">

    <div class="modal-content">

        <span
        class="close"
        onclick="closeModal()">
        &times;
        </span>

        <h2>HR Details</h2>

        <div id="hrDetails"></div>

    </div>

</div>
<script src="admin.js"></script>

</body>
</html>
