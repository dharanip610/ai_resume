<!DOCTYPE html>
<html>
<head>
    <title>HR Dashboard - AI ATS</title>
    <link rel="stylesheet" href="style.css">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f6f9;
        }

        .topbar {
            background: #111827;
            color: white;
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            align-items: center;
        }

        .logo {
            font-size: 18px;
            font-weight: bold;
        }

        nav a {
            color: white;
            margin-left: 15px;
            text-decoration: none;
        }

        nav a:hover {
            color: #38bdf8;
        }

        .header {
            padding: 20px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card h2 {
            margin: 0;
            font-size: 28px;
        }

        .section {
            margin: 20px;
            padding: 20px;
            background: white;
            border-radius: 10px;
        }

        button {
            padding: 10px 15px;
            margin-right: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: #2563eb;
            color: white;
        }

        button:hover {
            background: #1d4ed8;
        }

        @media(max-width: 768px){
            .cards {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
    <div class="logo">🧠 AI Resume ATS</div>

    <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="upload.html">Upload Resume</a>
        <a href="candidates.html">Candidates</a>
        <a href="#" onclick="logout()">Logout</a>
    </nav>
</div>

<!-- HEADER -->
<div class="header">
    <h1>HR Dashboard</h1>
    <p>Recruitment Analytics Overview</p>
</div>

<!-- STATS -->
<div class="cards">

    <div class="card">
        <h3>Total Candidates</h3>
        <h2 id="totalResumes">0</h2>
    </div>

    <div class="card">
        <h3>New Candidates</h3>
        <h2 id="newCandidates">0</h2>
    </div>

    <div class="card">
        <h3>Selected</h3>
        <h2 id="selectedCount">0</h2>
    </div>

    <div class="card">
        <h3>Rejected</h3>
        <h2 id="rejectedCount">0</h2>
    </div>

</div>

<!-- QUICK ACTIONS -->
<div class="section">

    <h2>Quick Actions</h2>

    <button onclick="location.href='upload.html'">
        📤 Upload Resume
    </button>

    <button onclick="location.href='candidates.html'">
        👥 View Candidates
    </button>

</div>

<script>
async function loadDashboard() {

    const token = localStorage.getItem("access_token");

    const res = await fetch("http://127.0.0.1:8000/dashboard", {
        method: "GET",
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    const data = await res.json();

    if (data.status === "success") {

        const stats = data.data;

        document.getElementById("totalResumes").innerText = stats.total_candidates;
        document.getElementById("newCandidates").innerText = stats.new_candidates;
        document.getElementById("selectedCount").innerText = stats.selected;
        document.getElementById("rejectedCount").innerText = stats.rejected;
    }
}

function logout() {
    localStorage.removeItem("access_token");
    window.location.href = "login.html";
}

loadDashboard();
</script>

</body>
</html>
