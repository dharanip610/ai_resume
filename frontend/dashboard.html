<!DOCTYPE html>
<html>
<head>
    <title>AI Resume ATS Dashboard</title>
    <link rel="stylesheet" href="hr-dashboard.css">
</head>

<body>

<div class="topbar">

    <div class="logo">
         AI Resume ATS
    </div>

    <nav>
        <a href="upload.html">Upload</a>
        <a href="candidates.html">Candidates</a>
        <a href="analyze-jd.html">JD Analyzer</a>
            <a href="profile.html">Profile</a>
        <a href="#" onclick="logout()">Logout</a>
    </nav>

</div>

<div class="header">
    <h1>HR Dashboard</h1>
    <p>Recruitment Analytics Overview</p>
</div>

<div class="cards">

    <div class="card">
        <h3>Total Candidates</h3>
        <h2 id="totalResumes" class="total">0</h2>
    </div>

    <div class="card">
        <h3>New Candidates</h3>
        <h2 id="newCandidates" class="new">0</h2>
    </div>

    <div class="card">
        <h3>Selected</h3>
        <h2 id="selectedCount" class="selected">0</h2>
    </div>

    <div class="card">
        <h3>Rejected</h3>
        <h2 id="rejectedCount" class="rejected">0</h2>
    </div>
<div class="card">
    <h3>Average ATS Score</h3>
    <h2 id="avgScore">0%</h2>
</div>

<div class="card">
    <h3>Candidates Analyzed</h3>
    <h2 id="analyzedCount">0</h2>
</div>

<div class="card">
    <h3>Follow Ups Due</h3>
    <h2 id="followupCount">0</h2>
</div>
</div>

<div class="section">

    <h2>Quick Actions</h2>

    <div class="actions">

        <button
            class="action-btn"
            onclick="location.href='upload.html'">
            📤 Upload Resume
        </button>

        <button
            class="action-btn"
            onclick="location.href='candidates.html'">
            👥 Candidates
        </button>

        <button
            class="action-btn"
            onclick="location.href='analyze-jd.html'">
            🎯 JD Analyzer
        </button>
        <button
            class="action-btn"
            onclick="location.href='profile.html'">
            Profile
        </button>

       <button
    class="action-btn"
    onclick="exportExcel()">
    📊 Export Excel
</button>

<button
    class="action-btn"
    onclick="exportCSV()">
    📄 Export CSV
</button>

    </div>

</div>

<script>
function exportExcel() {

    const token =
        localStorage.getItem("access_token");

    fetch(
          "https://ai-resume-xbi6.onrender.com/export/excel",
        {
            headers: {
                Authorization:
                    "Bearer " + token
            }
        }
    )
    .then(res => res.blob())
    .then(blob => {

        const a =
            document.createElement("a");

        a.href =
            URL.createObjectURL(blob);

        a.download =
            "candidates.xlsx";

        a.click();
    });
}

function exportCSV() {

    const token =
        localStorage.getItem("access_token");

    fetch(
        "https://ai-resume-xbi6.onrender.com/export/csv",
        {
            headers: {
                Authorization:
                    "Bearer " + token
            }
        }
    )
    .then(res => res.blob())
    .then(blob => {

        const a =
            document.createElement("a");

        a.href =
            URL.createObjectURL(blob);

        a.download =
            "candidates.csv";

        a.click();
    });
}
async function loadDashboard() {

    try {

        const token =
            localStorage.getItem("access_token");

        if (!token) {

            window.location.href =
                "login.html";

            return;
        }

        const res = await fetch(
            "https://ai-resume-xbi6.onrender.com/dashboard",
            {
                method: "GET",
                headers: {
                    "Authorization":
                        "Bearer " + token
                }
            }
        );

        const data = await res.json();

        console.log("DASHBOARD:", data);

        if (data.status === "success") {

            const stats = data.data;

            document.getElementById(
                "totalResumes"
            ).innerText =
                stats.total_candidates || 0;

            document.getElementById(
                "newCandidates"
            ).innerText =
                stats.new_candidates || 0;

            document.getElementById(
                "selectedCount"
            ).innerText =
                stats.selected || 0;

            document.getElementById(
                "rejectedCount"
            ).innerText =
                stats.rejected || 0;

            document.getElementById(
                "avgScore"
            ).innerText =
                (stats.average_ats_score || 0) + "%";

            document.getElementById(
                "analyzedCount"
            ).innerText =
                stats.candidates_analyzed || 0;

            document.getElementById(
                "followupCount"
            ).innerText =
                stats.followups_due || 0;
        }

    } catch (err) {

        console.error(
            "Dashboard Error:",
            err
        );
    }
}

function logout() {

    localStorage.removeItem(
        "access_token"
    );

    window.location.href =
        "login.html";
}

loadDashboard();

</script>

</body>
</html>
