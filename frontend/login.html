<div class="login-box">

    <div class="icon">📄</div>

    <h1>AI Resume ATS</h1>

    <p class="subtitle">
        HR Login Portal
    </p>

    <input
        type="email"
        id="email"
        placeholder="Enter Email">

    <input
        type="password"
        id="password"
        placeholder="Enter Password">

    <button id="loginBtn">
        Login
    </button>

    <div id="msg"></div>

</div>

<script>

    const supabaseClient = window.supabase.createClient(
        "https://tyznmenzpxstbgyqeppt.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR5em5tZW56cHhzdGJneXFlcHB0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3NzY4NzYsImV4cCI6MjA5NTM1Mjg3Nn0.afpxfRoVezm78D6WG_vOn7w1PVa7lcBZKnYMM479m-0"
    );

    async function login() {

        const email =
            document.getElementById("email").value.trim();

        const password =
            document.getElementById("password").value;

        const msg =
            document.getElementById("msg");

        if (!email || !password) {

            msg.style.color = "red";
            msg.innerText =
                "Please enter email and password";

            return;
        }

        msg.style.color = "#2563eb";
        msg.innerText = "Logging in...";

        try {

            const { data, error } =
                await supabaseClient.auth.signInWithPassword({
                    email,
                    password
                });

            if (error) {

                msg.style.color = "red";
                msg.innerText = error.message;
                return;
            }

            localStorage.setItem(
                "access_token",
                data.session.access_token
            );

            localStorage.setItem(
                "user",
                JSON.stringify(data.user)
            );

            msg.style.color = "green";
            msg.innerText =
                "Login Success 🚀";

            setTimeout(() => {

                window.location.href =
                    "dashboard.html";

            }, 1000);

        } catch (err) {

            console.error(err);

            msg.style.color = "red";
            msg.innerText =
                "Server Error";

        }
    }

    document
        .getElementById("loginBtn")
        .addEventListener("click", login);

</script>
