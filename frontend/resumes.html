<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Resume Scanner</title>

<style>
body {
    font-family: Arial;
    padding: 20px;
    background: #f5f5f5;
}

h2 {
    margin-bottom: 20px;
}

.top-bar {
    margin-bottom: 15px;
}

button {
    padding: 8px 12px;
    margin-right: 8px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.csv {
    background: #2196F3;
    color: white;
}

.excel {
    background: #FF9800;
    color: white;
}

.card {
    background: white;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
}

.name {
    font-weight: bold;
}

.small {
    font-size: 12px;
    color: gray;
}

.download {
    background: #4CAF50;
    color: white;
    margin-top: 8px;
}

.empty {
    color: gray;
}
</style>
</head>

<body>

<h2>📄 Resume List</h2>

<!-- EXPORT BUTTONS -->
<div class="top-bar">
    <button class="csv" onclick="exportCSV()">⬇ Export CSV</button>
    <button class="excel" onclick="exportExcel()">⬇ Export Excel</button>
</div>

<!-- LIST -->
<div id="container"></div>

<script>
console.log("RESUME UI LOADED");

const API = "https://127.0.0.1:8000";

// ======================
// LOAD RESUMES
// ======================
async function loadResumes() {

    const container = document.getElementById("container");
    container.innerHTML = "Loading...";

    const token = localStorage.getItem("access_token");

    if (!token) {
        container.innerHTML = "<p class='empty'>Login required</p>";
        return;
    }

    try {
        const res = await fetch(API + "/resumes", {
            headers: {
                Authorization: "Bearer " + token
            }
        });

        const data = await res.json();
        const list = data.data || [];

        container.innerHTML = "";

        if (list.length === 0) {
            container.innerHTML = "<p class='empty'>No resumes found</p>";
            return;
        }

        list.forEach(r => {

            const div = document.createElement("div");
            div.className = "card";

            div.innerHTML = `
                <div class="name">📄 ${r.file_name}</div>
                <div class="small">${r.created_at || ""}</div>

                <button class="download" onclick="downloadFile('${r.file_path}')">
                    Download
                </button>
            `;

            container.appendChild(div);
        });

    } catch (err) {
        console.error(err);
        container.innerHTML = "<p class='empty'>Error loading resumes</p>";
    }
}

// ======================
// DOWNLOAD FILE
// ======================
function downloadFile(path) {

    const token = localStorage.getItem("access_token");

    fetch(API + "/download?path=" + encodeURIComponent(path), {
        headers: {
            Authorization: "Bearer " + token
        }
    })
    .then(res => res.blob())
    .then(blob => {
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = path.split("/").pop();
        a.click();
    });
}

// ======================
// EXPORT CSV
// ======================
function exportCSV() {

    const token = localStorage.getItem("access_token");

    fetch(API + "/export/csv", {
        headers: {
            Authorization: "Bearer " + token
        }
    })
    .then(res => res.blob())
    .then(blob => {
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "resumes.csv";
        a.click();
    });
}

// ======================
// EXPORT EXCEL
// ======================
function exportExcel() {

    const token =
        localStorage.getItem("access_token");

    console.log(
        "EXPORT TOKEN =",
        token
    );

    fetch(API + "/export/excel", {
        headers: {
            Authorization:
                "Bearer " + token
        }
    })
    .then(res => {

        console.log(
            "EXPORT STATUS =",
            res.status
        );

        return res.blob();
    })
    .then(blob => {

        const a =
            document.createElement("a");

        a.href =
            URL.createObjectURL(blob);

        a.download =
            "resumes.xlsx";

        a.click();
    })
    .catch(err => {

        console.error(
            "EXPORT ERROR =",
            err
        );

    });
}

// INIT
loadResumes();

</script>

</body>
</html>
