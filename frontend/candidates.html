 <!DOCTYPE html>

<html>

<head>


<title>Candidates</title>

<link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="candidate.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


</head>

<body>

<nav>

    <div class="logo">
        ATS Pro
    </div>

    <a href="dashboard.html">Dashboard</a>
    <a href="upload.html">Upload</a>
    <a href="candidates.html" class="active">Candidates</a>
    <a href="analyze-jd.html">JD Analyzer</a>

    <div class="nav-right">
        <a href="#" onclick="logout()">Logout</a>
    </div>

</nav>

<div class="page-container">


<div class="page-header">

    <h1>Candidates</h1>

    <p>
        Manage and track all candidates
    </p>

</div>

<div class="top-actions">

    <input
        type="text"
        id="searchInput"
        placeholder="🔍 Search Candidate..."
    >

    <button
        class="filter-btn"
        onclick="openFilterPanel()"
    >
        Filters
    </button>

    <button
        class="export-btn"
        onclick="exportExcel()"
    >
        Export Excel
    </button>

</div>

<table>

    <thead>

        <tr>

            <th>Name</th>

            <th>Email</th>

            <th>Phone</th>


            <th>ATS Score</th>

            <th>Status</th>

            <th>Action</th>

        </tr>

    </thead>

    <tbody id="candidateTable"></tbody>

</table>


</div>

<div
    id="filterPanel"
    class="filter-panel"
>


<div class="filter-header">

    <h3>
        Filter Candidates
    </h3>

    <span
        class="close-filter"
        onclick="closeFilterPanel()"
    >
        ✖
    </span>

</div>

<input
    type="text"
    id="nameFilter"
    placeholder="Name"
>

<input
    type="text"
    id="emailFilter"
    placeholder="Email"
>

<input
    type="text"
    id="phoneFilter"
    placeholder="Phone"
>

<input
    type="text"
    id="locationFilter"
    placeholder="Location"
>

<input
    type="text"
    id="collegeFilter"
    placeholder="College"
>

<input
    type="text"
    id="skillsFilter"
    placeholder="Skills"
>

<input
    type="text"
    id="yearFilter"
    placeholder="Passout Year"
>

<input
    type="text"
    id="experienceFilter"
    placeholder="Experience"
>

<input
    type="text"
    id="internshipFilter"
    placeholder="Internship"
>

<input
    type="text"
    id="certificationFilter"
    placeholder="Certification"
>

<select id="statusFilter">

    <option value="">
        All Status
    </option>

    <option value="New">
        New
    </option>

    <option value="Contacted">
        Contacted
    </option>

    <option value="Interview Scheduled">
        Interview Scheduled
    </option>

    <option value="Selected">
        Selected
    </option>

    <option value="Rejected">
        Rejected
    </option>

    <option value="On Hold">
        On Hold
    </option>

</select>

<button
    class="apply-filter-btn"
    onclick="applyFilters()"
>
    Apply Filters
</button>

</div>

<div
    id="candidateModal"
    class="modal"
>


<div class="modal-content">

    <span
        class="close"
        onclick="closeModal()"
    >
        &times;
    </span>

    <h2>
        Candidate Profile
    </h2>

    <div id="modalBody"></div>

</div>


</div>



    <!-- JS -->
    <script src="candidates.js"></script>

</body>

</html>
