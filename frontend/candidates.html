<!DOCTYPE html>
<html>

<head>
    <title>Candidates</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

    <!-- NAV -->

   <nav>
    <a href="dashboard.html">Dashboard</a>
    <a href="upload.html">Upload</a>
    <a href="candidates.html">Candidates</a>
    <a href="analyze-jd.html">JD Analyzer</a>
    <a href="#" onclick="logout()">Logout</a>
</nav>

    <!-- SEARCH -->

    <div class="controls">

    <input
        type="text"
        id="searchInput"
        placeholder="Search by name, email, skills..."
    >

    <select id="statusFilter">

        <option value="">
            All Status
        </option>

        <option value="New">
            New
        </option>

        <option value="Contacted">
            Contacted
        </option>

        <option value="Interview Scheduled">
            Interview Scheduled
        </option>

        <option value="Selected">
            Selected
        </option>

        <option value="Rejected">
            Rejected
        </option>

        <option value="On Hold">
            On Hold
        </option>

    </select>

    <input
        type="text"
        id="locationFilter"
        placeholder="Filter by Location"
    >

    <input
        type="text"
        id="yearFilter"
        placeholder="Passout Year"
    >

    <input
        type="text"
        id="experienceFilter"
        placeholder="Experience"
    >
<input
    type="text"
    id="internshipFilter"
    placeholder="Internship"
>

<input
    type="text"
    id="certificationFilter"
    placeholder="Certification"
>

<textarea id="notes"></textarea>

<input
    type="date"
    id="followup_date">

<button>
    Save
</button>
    <button onclick="loadCandidates()">
        Refresh
    </button>

</div>

    <!-- TABLE -->

    <table>

        <thead>

            <tr>

                <th>Name</th>

                <th>Email</th>

                <th>Phone</th>

                <th>Location</th>

                <th>Passout Year</th>

                <th>College</th>
                <th>Skills</th>
                <th>ATS Score</th>
<th class="center-col">Status</th>
<th class="center-col">Action</th>

            </tr>

        </thead>

        <tbody id="candidateTable"></tbody>

    </table>

    <!-- =========================
         CANDIDATE MODAL
    ========================= -->

    <div
        id="candidateModal"
        class="modal"
    >

        <div class="modal-content">

            <span
                class="close"
                onclick="closeModal()"
            >
                &times;
            </span>

            <h2>
                Candidate Details
            </h2>

            <div id="modalBody"></div>

        </div>

    </div>

    <!-- JS -->

    <script src="app.js"></script>

</body>

</html>
